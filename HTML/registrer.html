    <div class="rememberLogInn" id="Signup">
      <h1>Sign up!</h1><hr>

      <form action="../index.html" class="loginForm">

        <label for="text">Skriv navnet ditt</label>
        <input type="text" name="username" placeholder="Lag et brukernavn" required>

        <label for="email">Skriv emailen din</label>
        <input type="email" name="email" placeholder="Skriv Email" required>

        <label for="password">Skriv passorde ditt</label>
        <input type="password" name="password" placeholder="Lag et passord" required>
        <hr>
        <button type="submit">Sign up</button>
      </form>
      
      <div class="forgot">
        <a href="../index.html">Har en bruker?</a>
      </div>

      <div class="sosialeLogin">
        <a href="#">
